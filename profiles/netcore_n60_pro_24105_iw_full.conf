# === Profile for netcore_n60-pro (ImmortalWrt 24.10.5) ===

PROFILE_NAME="netcore_n60_pro_24105_iw_full"
TARGET_PROFILE="netcore_n60-pro"

COMMON_LIST="autocore automount base-files block-mount bridger ca-bundle default-settings-chn dnsmasq-full dropbear firewall4 fitblk fstools kmod-crypto-hw-safexcel kmod-gpio-button-hotplug kmod-leds-gpio kmod-mt7915e kmod-mt7986-firmware kmod-nf-nathelper kmod-nf-nathelper-extra kmod-nft-offload kmod-phy-aquantia kmod-usb3 libc libgcc libustream-openssl logd luci luci-app-package-manager luci-compat luci-lib-base luci-lib-ipkg luci-light mt7986-wo-firmware mtd netifd nftables odhcp6c odhcpd-ipv6only opkg ppp ppp-mod-pppoe procd-ujail uboot-envtools uci uclient-fetch urandom-seed urngd wpad-openssl"

# === IMAGE BUILDER CONFIG
IMAGEBUILDER_URL="https://downloads.immortalwrt.org/releases/24.10.5/targets/mediatek/filogic/immortalwrt-imagebuilder-24.10.5-mediatek-filogic.Linux-x86_64.tar.zst"
#CUSTOM_KEYS="https://fantastic-packages.github.io/packages/releases/24.10/53ff2b6672243d28.pub"
#CUSTOM_REPOS="src/gz fantastic_luci https://fantastic-packages.github.io/packages/releases/24.10/packages/aarch64_cortex-a53/luci
#src/gz fantastic_packages https://fantastic-packages.github.io/packages/releases/24.10/packages/aarch64_cortex-a53/packages
#src/gz fantastic_special https://fantastic-packages.github.io/packages/releases/24.10/packages/aarch64_cortex-a53/special"
#DISABLED_SERVICES="transmission-daemon minidlna"
IMAGE_PKGS="$COMMON_LIST"
#IMAGE_EXTRA_NAME="custom"

# === Extra config options
#ROOTFS_SIZE="512"
#KERNEL_SIZE="64"

# === SOURCE BUILDER CONFIG
SRC_REPO="https://github.com/immortalwrt/immortalwrt.git"
SRC_BRANCH="v24.10.5"
SRC_TARGET="mediatek"
SRC_SUBTARGET="filogic"
SRC_ARCH="aarch64_cortex-a53"
SRC_PACKAGES="$IMAGE_PKGS"
# Number of cores, "safe" (all-1), or "debug" for single-core verbose build
SRC_CORES="safe"

## SPACE SAVING (For 4MB / 8MB flash devices)
#    - CONFIG_LUCI_SRCDIET=y      -> Compresses Lua/JS in LuCI (saves ~100-200KB)
#    - CONFIG_IPV6=n              -> Completely removes IPv6 support (saves ~300KB)
#    - CONFIG_KERNEL_DEBUG_INFO=n -> Removes debugging information from the kernel
#    - CONFIG_STRIP_KERNEL_EXPORTS=y -> Strips kernel export symbols (if no external kmods needed)
## FILE SYSTEMS (For SD cards / x86 / NanoPi)
#    By default, SquashFS (Read-Only) is created. EXT4 is recommended for SBCs.
#    - CONFIG_TARGET_ROOTFS_SQUASHFS=n -> Disable SquashFS
#    - CONFIG_TARGET_ROOTFS_EXT4FS=y   -> Enable EXT4 (Read/Write partition)
#    - CONFIG_TARGET_ROOTFS_TARGZ=y    -> Create an archive (for containers/backups)
## DEBUGGING AND LOGS
#    - CONFIG_KERNEL_PRINTK=n     -> Disables boot log output to console (quiet boot)
#    - CONFIG_BUILD_LOG=y         -> Saves build logs for each package (to debug build errors)
## FORCED MODULE INCLUSION
#    If a package fails to install via SRC_PACKAGES, you can force-enable it here.
# CONFIG_PACKAGE_kmod-usb-net-rndis=y

SRC_EXTRA_CONFIG='CONFIG_TARGET_mediatek=y
CONFIG_TARGET_mediatek_filogic=y
CONFIG_TARGET_mediatek_filogic_DEVICE_netcore_n60-pro=y'
