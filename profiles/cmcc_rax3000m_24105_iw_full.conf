# === Profile for cmcc_rax3000m (ImmortalWrt 24.10.5) ===

PROFILE_NAME="cmcc_rax3000m_24105_iw_full"
TARGET_PROFILE="cmcc_rax3000m"

COMMON_LIST="autocore automount base-files block-mount bridger ca-bundle default-settings-chn dnsmasq-full dropbear f2fsck firewall4 fitblk fstools kmod-crypto-hw-safexcel \
kmod-gpio-button-hotplug kmod-leds-gpio kmod-mt7915e kmod-mt7981-firmware kmod-nf-nathelper kmod-nf-nathelper-extra kmod-nft-offload kmod-phy-aquantia kmod-usb3 libc libgcc \
libustream-openssl logd luci luci-app-package-manager luci-compat luci-lib-base luci-lib-ipkg luci-light mkf2fs mt7981-wo-firmware mtd netifd nftables odhcp6c odhcpd-ipv6only \
opkg ppp ppp-mod-pppoe procd-ujail uboot-envtools uci uclient-fetch urandom-seed urngd wpad-openssl"

# Docker и контейнеризация
DOCKER_LIST="docker docker-compose dockerd iptables-nft"
# Веб-интерфейс LuCI — Приложения
LUCI_ADD="luci-app-argon-config luci-app-attendedsysupgrade luci-app-commands luci-app-cpu-status luci-app-docker luci-app-dockerman luci-app-internet-detector luci-app-ksmbd \
luci-app-minidlna luci-app-nlbwmon luci-app-statistics luci-app-ttyd luci-app-wol"
# Веб-интерфейс LuCI — Русская локализация
LUCI_I18N_RU="luci-i18n-attendedsysupgrade-ru luci-i18n-base-ru luci-i18n-commands-ru luci-i18n-cpu-status-ru luci-i18n-dockerman-ru luci-i18n-filemanager-ru \
luci-i18n-firewall-ru luci-i18n-internet-detector-ru luci-i18n-ksmbd-ru luci-i18n-minidlna-ru luci-i18n-package-manager-ru luci-i18n-statistics-ru luci-i18n-transmission-ru \
luci-i18n-ttyd-ru luci-i18n-usteer-ru luci-i18n-wol-ru"
# Веб-интерфейс LuCI — Темы и Протоколы
LUCI_THEME_PROTO="luci-proto-batman-adv luci-proto-vxlan luci-theme-argon"
# Модули ядра — Файловые системы и USB
LUCI_KERN="kmod-nft-queue block-mount kmod-fs-exfat kmod-fs-ext4 kmod-fs-ksmbd kmod-fs-netfs kmod-fs-ntfs3 kmod-fs-smbfs-common kmod-fs-vfat kmod-usb-ohci kmod-usb-storage \
kmod-usb-storage-uas kmod-usb-uhci kmod-usb2 kmod-usb3"
# Модули ядра — Кодировки
LUCI_CP="kmod-nls-cp1251 kmod-nls-cp866 kmod-nls-utf8"
# Работа с дисками и разделами
LUCI_DISKS="cfdisk fdisk gdisk lsblk parted e2fsprogs"
# Сетевые утилиты
LUCI_NETWORK="curl ethtool-full iftop ip-full iw-full openssh-sftp-server wget-ssl"
# Системные и консольные утилиты
LUCI_SYSTEM="bash fastfetch htop mc nano screen unzip gzip coreutils coreutils-sort"
# Службы мониторинга Collectd
LUCI_COLLECTD="collectd-mod-conntrack collectd-mod-df collectd-mod-ping collectd-mod-sensors"
# Антиблокировщики
ZAP_LIST="luci-app-zapret zapret zapret-ip2net zapret-mdig zapret-tpws"
# Список исключаемых пакетов:
EXCLUDE_LIST="-wpad-basic-mbedtls -iw -ip"

# === IMAGE BUILDER CONFIG
IMAGEBUILDER_URL="https://downloads.immortalwrt.org/releases/24.10.5/targets/mediatek/filogic/immortalwrt-imagebuilder-24.10.5-mediatek-filogic.Linux-x86_64.tar.zst"
CUSTOM_KEYS="https://fantastic-packages.github.io/packages/releases/24.10/53ff2b6672243d28.pub"
CUSTOM_REPOS="src/gz fantastic_luci https://fantastic-packages.github.io/packages/releases/24.10/packages/aarch64_cortex-a53/luci
src/gz fantastic_packages https://fantastic-packages.github.io/packages/releases/24.10/packages/aarch64_cortex-a53/packages
src/gz fantastic_special https://fantastic-packages.github.io/packages/releases/24.10/packages/aarch64_cortex-a53/special"
#DISABLED_SERVICES="transmission-daemon minidlna"
IMAGE_PKGS="$COMMON_LIST $DOCKER_LIST $LUCI_ADD $LUCI_I18N_RU $LUCI_THEME_PROTO $LUCI_KERN $LUCI_CP $LUCI_DISKS $LUCI_NETWORK $LUCI_SYSTEM $LUCI_COLLECTD $EXCLUDE_LIST"
IMAGE_EXTRA_NAME="iqubik-v1.02"

# === Extra config options
#ROOTFS_SIZE="40512"
#KERNEL_SIZE="64"

# === SOURCE BUILDER CONFIG
SRC_REPO="https://github.com/immortalwrt/immortalwrt.git"
SRC_BRANCH="v24.10.5"
SRC_TARGET="mediatek"
SRC_SUBTARGET="filogic"
SRC_ARCH="aarch64_cortex-a53"
SRC_PACKAGES="$IMAGE_PKGS"
# Number of cores, "safe" (all-1), or "debug" for single-core verbose build
SRC_CORES="safe"

## SPACE SAVING (For 4MB / 8MB flash devices)
#    - CONFIG_LUCI_SRCDIET=y      -> Compresses Lua/JS in LuCI (saves ~100-200KB)
#    - CONFIG_IPV6=n              -> Completely removes IPv6 support (saves ~300KB)
#    - CONFIG_KERNEL_DEBUG_INFO=n -> Removes debugging information from the kernel
#    - CONFIG_STRIP_KERNEL_EXPORTS=y -> Strips kernel export symbols (if no external kmods needed)
## FILE SYSTEMS (For SD cards / x86 / NanoPi)
#    By default, SquashFS (Read-Only) is created. EXT4 is recommended for SBCs.
#    - CONFIG_TARGET_ROOTFS_SQUASHFS=n -> Disable SquashFS
#    - CONFIG_TARGET_ROOTFS_EXT4FS=y   -> Enable EXT4 (Read/Write partition)
#    - CONFIG_TARGET_ROOTFS_TARGZ=y    -> Create an archive (for containers/backups)
## DEBUGGING AND LOGS
#    - CONFIG_KERNEL_PRINTK=n     -> Disables boot log output to console (quiet boot)
#    - CONFIG_BUILD_LOG=y         -> Saves build logs for each package (to debug build errors)
## FORCED MODULE INCLUSION
#    If a package fails to install via SRC_PACKAGES, you can force-enable it here.
# CONFIG_PACKAGE_kmod-usb-net-rndis=y

SRC_EXTRA_CONFIG='CONFIG_TARGET_mediatek=y
CONFIG_TARGET_mediatek_filogic=y
CONFIG_TARGET_mediatek_filogic_DEVICE_cmcc_rax3000m=y'
